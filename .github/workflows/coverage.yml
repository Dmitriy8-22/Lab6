name: Code Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y lcov
        pip install gcovr
        
    - name: Configure with coverage flags
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_CXX_FLAGS="--coverage -g -O0" ../banking
        
    - name: Build
      run: |
        cd build
        make -j2
        
    - name: Run tests
      run: |
        cd build
        ./tests/run_tests
        
    - name: Generate coverage report
      uses: threeal/gcovr-action@v1.0.0
      with:
        root: banking
        coverage-path: build
        exclude: '.*/tests/.*|.*/build/.*'
        coveralls-send: true
        coveralls-repo-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
