name: Code Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y lcov
        pip install gcovr
        
    - name: Configure with coverage flags
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_CXX_FLAGS="--coverage -g -O0" ../banking
        
    - name: Build
      run: |
        cd build
        make -j2
        
    - name: Run tests
      run: |
        cd build
        ./tests/run_tests
        
    - name: Generate coverage report
      run: |
        cd build
        gcovr --root .. \
              --exclude '.*/tests/.*' \
              --exclude '.*/build/.*' \
              --exclude '.*/_deps/.*' \
              --exclude '.*/googletest/.*' \
              --exclude '.*/CMakeFiles/.*' \
              --exclude '.*/mock_account.h' \
              --coveralls coverage.json
        
    - name: Send to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: build/coverage.json
        format: coveralls
