name: Code Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcovr lcov
        pip install --user gcovr
        
    - name: Configure with coverage flags
      run: |
        mkdir -p build && cd build
        cmake -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug ..
        
    - name: Build
      run: |
        cd build
        make -j2
        
    - name: Run tests
      run: |
        cd build
        ./tests/run_tests
        echo "Tests exit code: $?"
        
    - name: Debug - find gcda files
      run: |
        cd build
        echo "=== Looking for .gcda files ==="
        find . -name "*.gcda" -type f || echo "No .gcda files found!"
        echo "=== Looking for .gcno files ==="
        find . -name "*.gcno" -type f || echo "No .gcno files found!"
        echo "=== Build directory structure ==="
        ls -la banking/
        ls -la tests/
        
    - name: Generate coverage report directly
      run: |
        cd build
        echo "=== Running gcovr ==="
        gcovr --root .. --print-summary
        echo "=== Generating coverage.json ==="
        gcovr --root .. \
              --filter '.*/banking/.*\.cpp$' \
              --coveralls coverage.json
        echo "=== coverage.json size ==="
        ls -la coverage.json || echo "coverage.json not created!"
        echo "=== coverage.json content (first 20 lines) ==="
        head -20 coverage.json || echo "coverage.json is empty!"
        
    - name: Send to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: build/coverage.json
        format: coveralls
      continue-on-error: true
