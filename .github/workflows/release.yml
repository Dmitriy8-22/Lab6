name: Create Release Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  source-archives:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: |
        git archive --format=tar.gz --output=solver-app-${{ github.ref_name }}-source.tar.gz HEAD
        git archive --format=zip --output=solver-app-${{ github.ref_name }}-source.zip HEAD
    - uses: softprops/action-gh-release@v1
      with:
        files: solver-app-*-source.*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies
      run: sudo apt update && sudo apt install -y rpm
    - name: Configure
      run: mkdir build && cd build && cmake -DCMAKE_BUILD_TYPE=Release ..
    - name: Build
      run: cd build && make -j2
    - name: Create Linux packages
      run: |
        cd build
        cpack -G DEB
        cpack -G RPM
        cpack -G TGZ
    - uses: softprops/action-gh-release@v1
      with:
        files: |
          build/*.deb
          build/*.rpm
          build/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - uses: lukka/get-cmake@latest
    - name: Configure
      run: mkdir build && cd build && cmake -DCMAKE_BUILD_TYPE=Release ..
    - name: Build
      run: cd build && make -j2
    - name: Create macOS package
      run: cd build && cpack -G DragNDrop
    - uses: softprops/action-gh-release@v1
      with:
        files: build/*.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install WiX Toolset
      run: |
        choco install wixtoolset -y
        echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    - name: Configure
      run: mkdir build && cd build && cmake -DCMAKE_BUILD_TYPE=Release ..
    - name: Build
      run: cd build && cmake --build . --config Release
    - name: Create MSI package with logging
      shell: pwsh
      run: |
        cd build
        cpack -G WIX 2>&1 | Out-String | Write-Host
        Write-Host "=== Checking for WiX log ==="
        $logPath = "_CPack_Packages/win64/WIX/wix.log"
        if (Test-Path $logPath) {
          Write-Host "=== WiX log content ==="
          Get-Content $logPath | Write-Host
        } else {
          Write-Host "WiX log not found at: $logPath"
          Get-ChildItem -Recurse -Filter "*.log" | ForEach-Object {
            Write-Host "Found log: $($_.FullName)"
            Get-Content $_.FullName | Write-Host
          }
        }
    - uses: softprops/action-gh-release@v1
      with:
        files: build/*.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
