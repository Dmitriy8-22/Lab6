name: Create Release Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  source-archives:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: |
        git archive --format=tar.gz --output=solver-app-${{ github.ref_name }}-source.tar.gz HEAD
        git archive --format=zip --output=solver-app-${{ github.ref_name }}-source.zip HEAD
    - uses: softprops/action-gh-release@v1
      with:
        files: solver-app-*-source.*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: sudo apt update && sudo apt install -y rpm
    - run: mkdir build && cd build && cmake -DCMAKE_BUILD_TYPE=Release ..
    - run: cd build && make -j2
    - run: cd build && cpack -G DEB && cpack -G RPM && cpack -G TGZ
    - uses: softprops/action-gh-release@v1
      with:
        files: build/*.deb build/*.rpm build/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - uses: lukka/get-cmake@latest
    - run: mkdir build && cd build && cmake -DCMAKE_BUILD_TYPE=Release ..
    - run: cd build && make -j2
    - run: cd build && cpack -G DragNDrop
    - uses: softprops/action-gh-release@v1
      with:
        files: build/*.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - uses: lukka/get-cmake@latest
    - name: Install WiX Toolset
      run: choco install wixtoolset -y
    - run: mkdir build && cd build && cmake -DCMAKE_BUILD_TYPE=Release ..
    - run: cd build && cmake --build . --config Release
    - name: Create MSI package
      run: cd build && cpack -G WIX
    - uses: softprops/action-gh-release@v1
      with:
        files: build/*.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
